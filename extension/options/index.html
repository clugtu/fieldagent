<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FieldAgent Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; font-size: 13px; max-width: 480px;
           margin: 32px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    p.subtitle { color: #6b7280; margin-bottom: 24px; }
    label { display: block; font-weight: 500; margin-bottom: 4px; margin-top: 16px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 13px; outline: none;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,.15); }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 3px; }
    button { margin-top: 24px; padding: 8px 18px; background: #4f46e5; color: white;
             border: none; border-radius: 6px; font-size: 13px; font-weight: 500;
             cursor: pointer; }
    button:hover { background: #4338ca; }
    .saved { margin-top: 10px; font-size: 12px; color: #059669; display: none; }
  </style>
</head>
<body>
  <h1>FieldAgent</h1>
  <p class="subtitle">Connect to your FieldAgent service.</p>

  <label for="serviceUrl">Service URL</label>
  <input id="serviceUrl" type="text" placeholder="https://fieldagent.example.com" />
  <p class="hint">The URL of your running FieldAgent service (no trailing slash).</p>

  <label for="apiKey">API Key</label>
  <input id="apiKey" type="password" placeholder="Your API key" />
  <p class="hint">Generated by your service on first start. Check the service logs.</p>

  <button id="save">Save</button>
  <p class="saved" id="saved-msg">✓ Saved</p>

  <script>
    const urlInput = document.getElementById('serviceUrl')
    const keyInput = document.getElementById('apiKey')
    const savedMsg = document.getElementById('saved-msg')

    chrome.storage.sync.get(['serviceUrl', 'apiKey'], ({ serviceUrl, apiKey }) => {
      if (serviceUrl) urlInput.value = serviceUrl
      if (apiKey) keyInput.value = apiKey
    })

    document.getElementById('save').addEventListener('click', () => {
      chrome.storage.sync.set(
        { serviceUrl: urlInput.value.trim().replace(/\/$/, ''), apiKey: keyInput.value.trim() },
        () => {
          savedMsg.style.display = 'block'
          setTimeout(() => { savedMsg.style.display = 'none' }, 2000)
        }
      )
    })
  </script>
</body>
</html>
