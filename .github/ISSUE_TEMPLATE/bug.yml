name: Bug
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you see? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Platform, browser version, service version, relevant logs.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - extension
        - service
        - agent
        - ci-cd
        - other
    validations:
      required: true
