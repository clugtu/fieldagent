name: Release

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:
  build-extension:
    name: Package extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          cd extension
          zip -r ../fieldagent-extension.zip . \
            --exclude "*.DS_Store" \
            --exclude "__pycache__/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fieldagent-extension
          path: fieldagent-extension.zip
          retention-days: 30

      # On a tagged release, also attach the zip to the GitHub release
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: fieldagent-extension.zip
