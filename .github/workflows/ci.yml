name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  service:
    name: Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: service/requirements.txt

      - name: Install dependencies
        run: pip install -r service/requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check service/

      - name: Format check (ruff)
        run: ruff format --check service/

      - name: Import check
        run: PYTHONPATH=. python -c "from service.main import app; print('Service imports OK')"
        env:
          ANTHROPIC_API_KEY: placeholder
          FIELDAGENT_API_KEYS: placeholder

      - name: Tests
        run: PYTHONPATH=. pytest service/tests/
        env:
          ANTHROPIC_API_KEY: placeholder
          FIELDAGENT_API_KEYS: test-key

  extension:
    name: Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Tests (Jest)
        run: npm test
        working-directory: extension

      - name: Validate manifest
        run: |
          python - <<'EOF'
          import json
          with open('extension/manifest.json') as f:
              m = json.load(f)
          assert m['manifest_version'] == 3, 'must be MV3'
          assert 'background' in m
          assert 'content_scripts' in m
          print('manifest.json OK')
          EOF
